services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles: ["core", "full"]

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    profiles: ["core", "full"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      ALERTS_QUEUE: ${ALERTS_QUEUE:-alerts_queue}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - redis
      - postgres
    profiles: ["core", "full"]

  worker:
    build:
      context: .
      dockerfile: workers/alerts/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      ALERTS_QUEUE: ${ALERTS_QUEUE:-alerts_queue}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-1.0}
    depends_on:
      - redis
    profiles: ["core", "full"]

  web:
    image: node:20-alpine
    working_dir: /web
    command: sh -c "echo 'web placeholder for step 3' && sleep infinity"
    ports:
      - "${WEB_PORT:-3000}:3000"
    profiles: ["core", "full"]

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    profiles: ["full"]

  greenmail:
    image: greenmail/standalone:2.1.0
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.all
        -Dgreenmail.hostname=0.0.0.0
        -Dgreenmail.users=${GREENMAIL_USER}:${GREENMAIL_PASSWORD}
    ports:
      - "${GREENMAIL_SMTP_PORT:-3025}:3025"
      - "${GREENMAIL_IMAP_PORT:-3143}:3143"
      - "${GREENMAIL_WEB_PORT:-8082}:8080"
    profiles: ["full"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    profiles: ["full"]

  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${KEYCLOAK_DB_PORT:-5433}:5432"
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    profiles: ["full"]

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    depends_on:
      - keycloak-db
    profiles: ["full"]

volumes:
  postgres_data:
  minio_data:
  keycloak_db_data:
