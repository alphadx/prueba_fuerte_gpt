services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles: ["core", "full"]

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    profiles: ["core", "full"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      ALERTS_QUEUE: ${ALERTS_QUEUE:-alerts_queue}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - redis
      - postgres
    profiles: ["core", "full"]

  worker:
    build:
      context: .
      dockerfile: workers/alerts/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      ALERTS_QUEUE: ${ALERTS_QUEUE:-alerts_queue}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-1.0}
    depends_on:
      - redis
    profiles: ["core", "full"]

  web:
    image: node:20-alpine
    working_dir: /web
    command: sh -c "echo 'web placeholder for step 3' && sleep infinity"
    ports:
      - "${WEB_PORT:-3000}:3000"
    profiles: ["core", "full"]

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    profiles: ["full"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    profiles: ["full"]

volumes:
  postgres_data:
  minio_data:
