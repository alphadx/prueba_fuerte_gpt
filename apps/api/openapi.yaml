openapi: 3.1.0
info:
  title: ERP Barrio API
  version: 0.3.5
  description: Contrato inicial del API del MVP ERP.
servers:
  - url: http://localhost:8000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
    AlertDispatchRequest:
      type: object
      required: [employee_id, document_type, days_to_expire]
      properties:
        employee_id:
          type: string
          minLength: 1
        document_type:
          type: string
          minLength: 1
        days_to_expire:
          type: integer
          minimum: 0
    AlertDispatchResponse:
      type: object
      required: [status, backend]
      properties:
        status:
          type: string
          example: queued
        backend:
          type: string
          example: redis
    ProductCreateRequest:
      type: object
      required: [sku, name, price]
      properties:
        sku:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        price:
          type: number
          exclusiveMinimum: 0
    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        price:
          type: number
          exclusiveMinimum: 0
    ProductResponse:
      type: object
      required: [id, sku, name, price]
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        price:
          type: number
    ProductListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
    BranchCreateRequest:
      type: object
      required: [code, name, address]
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        is_active:
          type: boolean
          default: true
    BranchUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        is_active:
          type: boolean
    BranchResponse:
      type: object
      required: [id, code, name, address, is_active]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        address:
          type: string
        is_active:
          type: boolean
    BranchListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BranchResponse'
    EmployeeCreateRequest:
      type: object
      required: [employee_code, full_name, role]
      properties:
        employee_code:
          type: string
          minLength: 1
        full_name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        is_active:
          type: boolean
          default: true
    EmployeeUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        is_active:
          type: boolean
    EmployeeResponse:
      type: object
      required: [id, employee_code, full_name, role, is_active]
      properties:
        id:
          type: string
        employee_code:
          type: string
        full_name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
    EmployeeListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeResponse'
    DocumentTypeCreateRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        requires_expiry:
          type: boolean
          default: true
        is_active:
          type: boolean
          default: true
    DocumentTypeUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        requires_expiry:
          type: boolean
        is_active:
          type: boolean
    DocumentTypeResponse:
      type: object
      required: [id, code, name, requires_expiry, is_active]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        requires_expiry:
          type: boolean
        is_active:
          type: boolean
    DocumentTypeListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentTypeResponse'
    UserCreateRequest:
      type: object
      required: [username, full_name, role]
      properties:
        username:
          type: string
          minLength: 3
        full_name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        is_active:
          type: boolean
          default: true
    UserUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        is_active:
          type: boolean
    UserResponse:
      type: object
      required: [id, username, full_name, role, is_active]
      properties:
        id:
          type: string
        username:
          type: string
        full_name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
    UserListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
paths:
  /health:
    get:
      tags: [system]
      summary: Verifica disponibilidad del servicio
      operationId: getHealth
      responses:
        '200':
          description: Servicio disponible
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /ready:
    get:
      tags: [system]
      summary: Verifica disponibilidad para recibir tráfico
      operationId: getReady
      responses:
        '200':
          description: Servicio listo
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ready
  /alerts/dispatch:
    post:
      tags: [alerts]
      summary: Encola una alerta documental para worker asíncrono
      operationId: postAlertsDispatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertDispatchRequest'
      responses:
        '200':
          description: Alerta encolada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertDispatchResponse'
        '503':
          description: Cola no disponible y fallback deshabilitado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /products:
    get:
      tags: [products]
      summary: Lista productos del catálogo
      operationId: getProducts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listado de productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [products]
      summary: Crea un producto en catálogo
      operationId: postProducts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: SKU duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /products/{product_id}:
    parameters:
      - in: path
        name: product_id
        required: true
        schema:
          type: string
    get:
      tags: [products]
      summary: Obtiene un producto por identificador
      operationId: getProductById
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Producto encontrado
