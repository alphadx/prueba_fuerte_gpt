            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Producto no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [products]
      summary: Actualiza campos de un producto
      operationId: patchProductById
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
