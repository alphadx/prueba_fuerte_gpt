openapi: 3.1.0
info:
  title: ERP Barrio API
  version: 0.3.2
  description: Contrato inicial del API del MVP ERP.
servers:
  - url: http://localhost:8000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
    AlertDispatchRequest:
      type: object
      required: [employee_id, document_type, days_to_expire]
      properties:
        employee_id:
          type: string
          minLength: 1
        document_type:
          type: string
          minLength: 1
        days_to_expire:
          type: integer
          minimum: 0
    AlertDispatchResponse:
      type: object
      required: [status, backend]
      properties:
        status:
          type: string
          example: queued
        backend:
          type: string
          example: redis
    ProductCreateRequest:
      type: object
      required: [sku, name, price]
      properties:
        sku:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        price:
          type: number
          exclusiveMinimum: 0
    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        price:
          type: number
          exclusiveMinimum: 0
    ProductResponse:
      type: object
      required: [id, sku, name, price]
      properties:
        id:
          type: string
        sku:
          type: string
        name:
          type: string
        price:
          type: number
    ProductListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
    UserCreateRequest:
      type: object
      required: [username, full_name, role]
      properties:
        username:
          type: string
          minLength: 3
        full_name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        is_active:
          type: boolean
          default: true
    UserUpdateRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        is_active:
          type: boolean
    UserResponse:
      type: object
      required: [id, username, full_name, role, is_active]
      properties:
        id:
          type: string
        username:
          type: string
        full_name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
    UserListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
paths:
  /health:
    get:
      tags: [system]
      summary: Verifica disponibilidad del servicio
      operationId: getHealth
      responses:
        '200':
          description: Servicio disponible
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /ready:
    get:
      tags: [system]
      summary: Verifica disponibilidad para recibir tráfico
      operationId: getReady
      responses:
        '200':
          description: Servicio listo
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ready
  /alerts/dispatch:
    post:
      tags: [alerts]
      summary: Encola una alerta documental para worker asíncrono
      operationId: postAlertsDispatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertDispatchRequest'
      responses:
        '200':
          description: Alerta encolada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertDispatchResponse'
        '503':
          description: Cola no disponible y fallback deshabilitado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /products:
    get:
      tags: [products]
      summary: Lista productos del catálogo
      operationId: getProducts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listado de productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [products]
      summary: Crea un producto en catálogo
      operationId: postProducts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: SKU duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /products/{product_id}:
    parameters:
      - in: path
        name: product_id
        required: true
        schema:
          type: string
    get:
      tags: [products]
      summary: Obtiene un producto por identificador
      operationId: getProductById
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Producto no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [products]
      summary: Actualiza campos de un producto
      operationId: patchProductById
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Producto actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Producto no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [products]
      summary: Elimina un producto del catálogo
      operationId: deleteProductById
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Producto eliminado
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Producto no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users:
    get:
      tags: [users]
      summary: Lista usuarios de la organización
      operationId: getUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listado de usuarios
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [users]
      summary: Crea un usuario del ERP
      operationId: postUsers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Usuario duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{user_id}:
    parameters:
      - in: path
        name: user_id
        required: true
        schema:
          type: string
    get:
      tags: [users]
      summary: Obtiene un usuario por identificador
      operationId: getUserById
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [users]
      summary: Actualiza campos de un usuario
      operationId: patchUserById
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [users]
      summary: Elimina un usuario del ERP
      operationId: deleteUserById
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Usuario eliminado
        '401':
          description: Token ausente/inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Rol insuficiente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
