openapi: 3.1.0
info:
  title: ERP Barrio API
  version: 0.3.0
  description: Contrato inicial del API del MVP ERP.
servers:
  - url: http://localhost:8000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /health:
    get:
      tags: [system]
      summary: Verifica disponibilidad del servicio
      operationId: getHealth
      responses:
        '200':
          description: Servicio disponible
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /ready:
    get:
      tags: [system]
      summary: Verifica disponibilidad para recibir tráfico
      operationId: getReady
      responses:
        '200':
          description: Servicio listo
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ready
  /alerts/dispatch:
    post:
      tags: [alerts]
      summary: Encola una alerta documental para worker asíncrono
      operationId: postAlertsDispatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_id, document_type, days_to_expire]
              properties:
                employee_id:
                  type: string
                  minLength: 1
                document_type:
                  type: string
                  minLength: 1
                days_to_expire:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Alerta encolada
          content:
            application/json:
              schema:
                type: object
                required: [status, backend]
                properties:
                  status:
                    type: string
                    example: queued
                  backend:
                    type: string
                    example: redis
        '503':
          description: Cola no disponible y fallback deshabilitado
          content:
            application/json:
              schema:
                type: object
                required: [detail]
                properties:
                  detail:
                    type: string
  /products:
    get:
      tags: [products]
      summary: Lista productos del catálogo
      operationId: getProducts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Listado de productos
    post:
      tags: [products]
      summary: Crea un producto en catálogo
      operationId: postProducts
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Producto creado
        '409':
          description: SKU duplicado
  /products/{product_id}:
    get:
      tags: [products]
      summary: Obtiene un producto por identificador
      operationId: getProductById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: product_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto encontrado
        '404':
          description: Producto no existe
    patch:
      tags: [products]
      summary: Actualiza campos de un producto
      operationId: patchProductById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: product_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto actualizado
        '404':
          description: Producto no existe
    delete:
      tags: [products]
      summary: Elimina un producto del catálogo
      operationId: deleteProductById
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: product_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Producto eliminado
        '404':
          description: Producto no existe
